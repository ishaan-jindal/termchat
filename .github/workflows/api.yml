name: API Image

on:
  push:
    branches:
      - main

    paths:
      - "api/**"
      - "scripts/**"
      - "Dockerfile.api"

jobs:

  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/termchat-api:latest
            ghcr.io/${{ github.repository }}/termchat-api:${{ github.sha }}
