name: Release Binaries

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""

          - os: linux
            arch: arm64
            ext: ""

          - os: darwin
            arch: amd64
            ext: ""

          - os: darwin
            arch: arm64
            ext: ""

          - os: windows
            arch: amd64
            ext: ".exe"

          - os: windows
            arch: arm64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Build binary
        run: |
          mkdir -p dist

          GOOS=${{ matrix.os }} \
          GOARCH=${{ matrix.arch }} \
          go build \
          -o dist/termchat-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
          ./cli

      - name: Upload release binary
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
