name: CLI Release

on:
  push:
    tags:
      - "cli-v*"

jobs:

  binaries:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      max-parallel: 2

      matrix:
        include:

          - os: linux
            arch: amd64
            ext: ""

          - os: linux
            arch: arm64
            ext: ""

          - os: linux
            arch: 386
            ext: ""

          - os: darwin
            arch: amd64
            ext: ""

          - os: darwin
            arch: arm64
            ext: ""

          - os: windows
            arch: amd64
            ext: ".exe"

          - os: windows
            arch: arm64
            ext: ".exe"

          - os: android
            arch: arm64
            ext: ""

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Build CLI binary
        run: |
          mkdir -p dist

          CGO_ENABLED=0 \
          GOOS=${{ matrix.os }} \
          GOARCH=${{ matrix.arch }} \
          go build \
          -ldflags "\
          -s -w \
          -X main.Version=${{ github.ref_name }} \
          -X main.DefaultAPI=${{ vars.TERMCHAT_API_URL }} \
          -X main.DefaultWS=${{ vars.TERMCHAT_WS_URL }}" \
          -o dist/termchat-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
          ./cli

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  checksums:
    runs-on: ubuntu-latest
    needs: binaries

    permissions:
      contents: write

    steps:

      - name: Wait for release assets
        run: sleep 15

      - name: Download all release binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --dir dist \
            --pattern 'termchat-*'

      - name: Generate checksums
        run: |
          cd dist
          sha256sum termchat-* > termchat-checksums.txt
          cat termchat-checksums.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termchat-checksums.txt

  aur-publish:
    needs: checksums
    uses: ./.github/workflows/aur.yml
    with:
      tag: ${{ github.ref_name }}
    secrets:
      AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
