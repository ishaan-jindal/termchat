name: CLI Release

on:
  push:
    tags:
      - "cli-v*"

jobs:

  binaries:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      max-parallel: 2

      matrix:
        include:

          - os: linux
            arch: amd64
            ext: ""

          - os: linux
            arch: arm64
            ext: ""

          - os: linux
            arch: 386
            ext: ""

          - os: darwin
            arch: amd64
            ext: ""

          - os: darwin
            arch: arm64
            ext: ""

          - os: windows
            arch: amd64
            ext: ".exe"

          - os: windows
            arch: arm64
            ext: ".exe"

          - os: android
            arch: arm64
            ext: ""

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Build CLI binary
        run: |
          mkdir -p dist

          CGO_ENABLED=0 \
          GOOS=${{ matrix.os }} \
          GOARCH=${{ matrix.arch }} \
          go build \
          -ldflags "\
          -s -w \
          -X main.Version=${{ github.ref_name }} \
          -X main.DefaultAPI=${{ vars.TERMCHAT_API_URL }} \
          -X main.DefaultWS=${{ vars.TERMCHAT_WS_URL }}" \
          -o dist/termchat-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
          ./cli

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  checksums:
    runs-on: ubuntu-latest
    needs: binaries

    permissions:
      contents: write

    steps:

      - name: Wait for release assets
        run: sleep 15

      - name: Download all release binaries
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --dir dist \
            --pattern 'termchat-*'

      - name: Generate checksums
        run: |
          cd dist
          sha256sum termchat-* > termchat-checksums.txt
          cat termchat-checksums.txt

      - name: Upload checksums
        uses: softprops/action-gh-release@v2
        with:
          files: dist/termchat-checksums.txt

  aur-publish:
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    needs: checksums

    steps:

      - name: Install dependencies
        run: pacman -Sy --noconfirm git openssh

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_PRIVATE_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          cat > ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur
            User aur
          EOF

      - name: Configure git
        run: |
          git config --global user.name "Ishaan Jindal"
          git config --global user.email "ishaan-jindal@users.noreply.github.com"

      - name: Extract version and checksums
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#cli-v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

          curl -fsSL \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/termchat-checksums.txt" \
            -o checksums.txt

          cat checksums.txt

          echo "amd64=$(grep 'termchat-linux-amd64$' checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "arm64=$(grep 'termchat-linux-arm64$' checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "i686=$(grep 'termchat-linux-386$' checksums.txt | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Clone AUR repo
        run: git clone ssh://aur@aur.archlinux.org/ishaans-termchat-bin.git aur-repo

      - name: Update PKGBUILD
        run: |
          cd aur-repo

          sed -i "s/^pkgver=.*/pkgver=${{ steps.meta.outputs.version }}/" PKGBUILD
          sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          sed -i "s/^sha256sums_x86_64=.*/sha256sums_x86_64=('${{ steps.meta.outputs.amd64 }}')/" PKGBUILD
          sed -i "s/^sha256sums_aarch64=.*/sha256sums_aarch64=('${{ steps.meta.outputs.arm64 }}')/" PKGBUILD
          sed -i "s/^sha256sums_i686=.*/sha256sums_i686=('${{ steps.meta.outputs.i686 }}')/" PKGBUILD

          echo "=== Updated PKGBUILD ==="
          cat PKGBUILD

      - name: Generate .SRCINFO
        run: |
          cd aur-repo
          useradd -m builder
          chown -R builder:builder .
          su builder -c "makepkg --printsrcinfo > .SRCINFO"
          cat .SRCINFO

      - name: Push to AUR
        run: |
          cd aur-repo
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet && echo "No changes to push" && exit 0
          git commit -m "Update to v${{ steps.meta.outputs.version }}"
          git push
