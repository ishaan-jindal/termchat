name: Release

on:
  push:
    tags:
      - "v*"

jobs:

  # =========================================
  # Build and upload CLI binaries
  # =========================================

  binaries:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            ext: ""

          - os: linux
            arch: arm64
            ext: ""

          - os: darwin
            arch: amd64
            ext: ""

          - os: darwin
            arch: arm64
            ext: ""

          - os: windows
            arch: amd64
            ext: ".exe"

          - os: windows
            arch: arm64
            ext: ".exe"

          - os: android
            arch: arm64
            ext: ""

          ### Legacy Systems ###
          - os: linux
            arch: 386
            ext: ""

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"

      - name: Build CLI binary
        run: |
          mkdir -p dist

          CGO_ENABLED=0 \
          GOOS=${{ matrix.os }} \
          GOARCH=${{ matrix.arch }} \
          go build \
          -o dist/termchat-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }} \
          ./cli

      - name: Upload release binaries
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  # =========================================
  # Build and push Docker images
  # =========================================

  docker:
    runs-on: ubuntu-latest

    needs: binaries

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository }}/termchat-api:${{ github.ref_name }}

      - name: Build and push websocket image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: ghcr.io/${{ github.repository }}/termchat-websocket:${{ github.ref_name }}
