services:

  websocket:
    build:
      context: .
      dockerfile: Dockerfile.server

    container_name: termchat-websocket

    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.api

    container_name: termchat-api

    restart: unless-stopped

    depends_on:
      - websocket

  caddy:
    image: caddy:latest

    container_name: termchat-caddy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile

    depends_on:
      - api
      - websocket

    restart: unless-stopped
