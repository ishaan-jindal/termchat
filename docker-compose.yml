services:

  websocket:
    image: ghcr.io/YOUR_USERNAME/termchat/termchat-websocket:v0.1.0

    container_name: termchat-websocket

    env_file:
      - .env

    restart: unless-stopped

  api:
    image: ghcr.io/YOUR_USERNAME/termchat/termchat-api:v0.1.0

    container_name: termchat-api

    env_file:
      - .env

    restart: unless-stopped

    depends_on:
      - websocket

  caddy:
    image: caddy:latest

    container_name: termchat-caddy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile

    depends_on:
      - api
      - websocket

    restart: unless-stopped
